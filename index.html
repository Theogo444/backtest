<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#1e3a5f" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="author" content="Sereo" />

    <!-- SEO : titre, description, canonical, Open Graph et Twitter Card sont
         injectés PAR PAGE via le composant Seo (vite-react-ssg / Head). Seules
         les balises identiques sur tout le site restent ici. -->
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Sereo" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Police Inter auto-hébergée (@fontsource, importée dans src/main.jsx) :
         aucune requête vers Google Fonts (RGPD + performance). -->

    <!-- Données structurées schema.org : application web -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Sereo",
        "alternateName": "Simulateur de Portefeuille FR",
        "url": "https://simulateur-portefeuille.fr/",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "Simulateur et backtest de portefeuille d'investissement pour particuliers français (PEA, CTO, Assurance-vie).",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
        "inLanguage": "fr-FR"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
