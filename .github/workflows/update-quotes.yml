name: Actualisation des cours (Marketstack — manuel)

# ⚠️ PLANIFICATION DÉSACTIVÉE.
# Le plan gratuit Marketstack facture PAR SYMBOLE (100 requêtes/mois) : mettre à
# jour 56 actifs/jour = ~1680/mois, impossible en gratuit. La fraîcheur
# quotidienne est donc assurée par un cron LOCAL sur le Mac (launchd +
# scripts/daily-refresh.sh → yfinance), qui n'est pas bloqué par Yahoo
# contrairement aux IP datacenter de GitHub Actions.
#
# Ce workflow reste disponible en déclenchement MANUEL uniquement (utile avec un
# plan Marketstack payant). Il requiert le secret MARKETSTACK_API_KEY.

on:
  workflow_dispatch: {} # déclenchement manuel seulement (plus de cron)

permissions:
  contents: write

# Évite deux exécutions concurrentes (cron + déclenchement manuel)
concurrency:
  group: update-quotes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Récupère les cours et met à jour quotes.json
        env:
          MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
        run: |
          npx esbuild scripts/update-quotes.mjs --bundle --platform=node \
            --format=esm --outfile=scripts/.update-quotes.bundle.mjs
          node scripts/.update-quotes.bundle.mjs
          rm -f scripts/.update-quotes.bundle.mjs

      - name: Commit & push si modifié
        run: |
          if [[ -n "$(git status --porcelain public/data/quotes.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/quotes.json
            git commit -m "chore: actualisation quotidienne des cours ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Aucun changement — pas de commit."
          fi
